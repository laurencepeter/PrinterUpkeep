# Full application stack for PrinterUpkeep.
#
# Everything is built from source on deploy — there is no root Dockerfile
# because this is a multi-service app. Point your host/PaaS at this file
# (build type: "Docker Compose") and it will build the api + web images and
# start them alongside PostgreSQL:
#
#   docker compose up -d --build
#
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-printerupkeep}
      POSTGRES_USER: ${DB_USER:-printerupkeep}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-printerupkeep} -d ${DB_NAME:-printerupkeep}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-printerupkeep}
      DB_USER: ${DB_USER:-printerupkeep}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_TTL: ${JWT_TTL:-12h}
      UPLOAD_DIR: /app/uploads
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-System Administrator}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    # Pre-built by CI (.github/workflows/build-web-image.yml) and pulled at
    # deploy time — the Flutter web build is far too slow/heavy (~2 GB SDK
    # image) to build inside a managed host's deploy window, so we build it on
    # GitHub Actions instead and the deploy host just pulls this small nginx
    # image. Override WEB_IMAGE to pin a specific tag/digest.
    # For local development, docker-compose.override.yml re-adds a build context
    # so `docker compose up --build` still builds web from ./app source.
    image: ${WEB_IMAGE:-ghcr.io/laurencepeter/printerupkeep-web:main}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # No fixed host port is published here on purpose. On a managed PaaS
    # (Coolify, etc.) the platform's reverse proxy routes your domain to this
    # container's port 80, so binding a host port would only cause
    # "port is already allocated" collisions on the shared host.
    # For a plain `docker compose up`, docker-compose.override.yml publishes
    # ${WEB_PORT:-8000}:80 automatically — see that file.
    expose:
      - "80"
    # Use 127.0.0.1, not localhost: nginx here listens on IPv4 only (`listen 80;`)
    # and the image's ipv6-by-default entrypoint skips adding `listen [::]:80;`
    # because this custom default.conf differs from the packaged one. busybox
    # wget resolves `localhost` to ::1 first, gets connection-refused, and the
    # container is reported unhealthy even though nginx is serving fine.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  uploads:
