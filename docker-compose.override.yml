# Local / direct-host overrides for a plain `docker compose up`.
#
# Docker Compose auto-merges this file ONLY when you run `docker compose`
# with no explicit `-f` flag (i.e. the documented `docker compose up -d --build`).
# It does two things for local/direct deployments:
#
#   1. Re-adds a build context for `web`, so you build the Flutter web image
#      from ./app source instead of pulling the CI-built image from a registry.
#      (`docker compose up -d --build` builds it and tags it as WEB_IMAGE.)
#   2. Publishes the web UI on a host port, so you can reach it at
#      http://<server>:${WEB_PORT:-8000} without any external reverse proxy.
#
# Managed platforms that build the stack themselves (e.g. Coolify runs
# `docker compose -f docker-compose.yml up -d`) pass an explicit `-f`, which
# disables automatic override loading — so this build context and host-port
# bind are skipped there. Those platforms pull the pre-built WEB_IMAGE and let
# their own proxy route to the container instead. That keeps the slow Flutter
# build off the deploy host and avoids host-port collisions.
services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8000}:80"
