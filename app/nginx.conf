server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter web SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container.
    #
    # Resolve `api` at request time via Docker's embedded DNS (127.0.0.11)
    # instead of once at startup. With a bare `proxy_pass http://api:8080`,
    # nginx resolves the upstream host when it loads the config and aborts with
    # "host not found in upstream 'api'" if the api container isn't up yet —
    # which crash-loops web and leaves the platform proxy with no healthy
    # backend ("no available server"). Using a variable in proxy_pass forces
    # per-request resolution, so web stays up and simply returns 502 until the
    # api container is reachable.
    #
    # Note: with a variable in proxy_pass, nginx does NOT substitute the matched
    # location prefix, so no URI part is given here — the original request URI
    # (e.g. /api/health) is forwarded unchanged, which is exactly what the API
    # (mounted under /api) expects.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream api;
        proxy_pass http://$api_upstream:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 25m;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;
}
