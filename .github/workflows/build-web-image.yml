name: Build web image

# Builds the Flutter web front-end (app/Dockerfile) and pushes it to GHCR so the
# deploy host can pull a small nginx image instead of running the heavy Flutter
# build inside its (short) deploy window. The published image is referenced by
# the `web` service in docker-compose.yml as
#   ghcr.io/<owner>/printerupkeep-web:main
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build-web-image.yml'
  # Allow manual runs, e.g. to publish the image before the first deploy.
  workflow_dispatch:

concurrency:
  group: build-web-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image name (lowercase owner)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/printerupkeep-web" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
